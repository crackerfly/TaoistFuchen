              *) exit 125 ;;
            esac

            printf '%s\n' '=== M5 TIMEOUT CLEANUP ==='
            make_m5_case timeout
            timeout_case=$active_m5_case
            timeout_selected="$timeout_case/selected"
            set +e
            /usr/bin/timeout --signal=TERM --kill-after=2s 5s \
              /usr/bin/sudo -n -- "$bwrap" \
                --die-with-parent --new-session \
                --unshare-user --disable-userns \
                --unshare-net --unshare-pid --unshare-uts --unshare-ipc \
                --uid 0 --gid 0 --cap-drop ALL \
                --clearenv \
                --setenv PATH /bin --setenv HOME / --setenv TMPDIR /tmp \
                --setenv LC_ALL C --setenv TZ UTC \
                --perms 0755 --size 33554432 --tmpfs / \
                --dir /bin --perms 0555 --file 0 /bin/busybox \
                --symlink busybox /bin/sh \
                --proc /proc --dev /dev \
                --perms 0700 --size 16777216 --tmpfs /tmp \
                --dir /fixture --bind "$timeout_selected" /fixture \
                --chdir / -- \
                /bin/busybox sh -eu -c \
                  '/bin/busybox printf timeout >/fixture/timeout-proof; /bin/busybox sleep 30' \
                <"$busybox"
            timeout_status=$?
            set -e
            printf 'M5_TIMEOUT_STATUS=%s\n' "$timeout_status"
            printf 'M5_TIMEOUT_STATUS=%s\n' "$timeout_status" >>"$m5_result"
            if [ "$timeout_status" -eq 124 ] || [ "$timeout_status" -eq 137 ]; then
              timeout_invocation_ok=1
            else
              timeout_invocation_ok=0
            fi
            set +e
            finalize_m5_lane TIMEOUT "$timeout_selected" timeout-proof \
              "$timeout_invocation_ok"
            timeout_finalize_status=$?
            set -e
            case "$timeout_finalize_status" in
              0) printf '%s\n' 'M5_TIMEOUT_RESULT=PASS' ;;
              1)
                m5_probe_status=1
                printf '%s\n' 'M5_TIMEOUT_RESULT=FAIL'
                ;;
              *) exit 127 ;;
            esac

            /bin/rmdir -- "$m5_root"
            if [ "$m5_probe_status" -eq 0 ]; then
              printf '%s\n' 'M5_ISOLATION_PROBE=PASS'
              printf '%s\n' 'M5_ISOLATION_PROBE=PASS' >>"$m5_result"
            else
              printf '%s\n' 'M5_ISOLATION_PROBE=FAIL'
              printf '%s\n' 'M5_ISOLATION_PROBE=FAIL' >>"$m5_result"
            fi
            if [ "$sdk_probe_status" -ne 0 ] || [ "$m5_probe_status" -ne 0 ]; then
              printf '%s\n' 'HYBRID_ISOLATION_PROBE=FAIL'
              exit 1
            fi
            printf '%s\n' 'HYBRID_ISOLATION_PROBE=PASS'
          ) >"$out/measurement.txt" 2>&1
          probe_status=$?
          set -e

          printf 'PROBE_STATUS=%s\n' "$probe_status" >"$out/result.txt"
          if [ "$probe_status" -eq 0 ]; then
            printf 'HYBRID_ISOLATION_PROBE=PASS\n' >>"$out/result.txt"
          else
            printf 'HYBRID_ISOLATION_PROBE=FAIL\n' >>"$out/result.txt"
          fi

          (
            cd "$out"
            /usr/bin/find . -type f ! -name SHA256SUMS -print0 |
              LC_ALL=C /usr/bin/sort -z |
              /usr/bin/xargs -0 /usr/bin/sha256sum >SHA256SUMS
          )
          /usr/bin/cat "$out/measurement.txt"
          /usr/bin/cat "$out/result.txt"
          /usr/bin/cat "$out/SHA256SUMS"
          exit "$probe_status"

