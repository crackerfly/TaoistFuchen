name: Diagnose TaoistFuchen hybrid isolation on ubuntu-24.04

'on':
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    name: Diagnose sudo-unshare and pinned Bubblewrap
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Measure and probe the exact isolation candidates
        shell: bash
        run: |
          set -Eeuo pipefail
          umask 077

          out=runner-isolation-v4
          mkdir -m 0700 -- "$out"

          set +e
          (
            set -Eeuo pipefail
            umask 077

            uid=$(/usr/bin/id -u)
            gid=$(/usr/bin/id -g)
            host_pid=$$
            host_net=$(/usr/bin/readlink /proc/self/ns/net)
            host_mnt=$(/usr/bin/readlink /proc/self/ns/mnt)
            host_pidns=$(/usr/bin/readlink /proc/self/ns/pid)
            host_uts=$(/usr/bin/readlink /proc/self/ns/uts)
            host_ipc=$(/usr/bin/readlink /proc/self/ns/ipc)
            repo_root=$(/usr/bin/readlink -f -- "$GITHUB_WORKSPACE")
            temp_root=$(/usr/bin/readlink -f -- "$RUNNER_TEMP")
            host_user=$(/usr/bin/readlink /proc/self/ns/user)
            work_root="$temp_root/taoistfuchen-isolation-v4-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            sdk_fixture="$work_root/sdk-fixture"
            sdk_sibling="$work_root/sdk-writable-sibling"
            m5_root="$work_root/m5-disposable"
            download_root="$work_root/downloads"
            extract_root="$work_root/extracted"
            listener_pid=
            active_m5_case=
            active_m5_case_devino=
            active_m5_parent_devino=
            bwrap=
            busybox=

            cleanup_m5_case() {
              candidate=${1-}
              [ -n "$candidate" ] || return 0
              [ -n "$busybox" ] && [ -x "$busybox" ] || {
                printf 'CLEANUP_ERROR=no pinned BusyBox for %s\n' "$candidate"
                return 1
              }
              /usr/bin/printf '%s  %s\n' \
                dbac288c29ba568459550a2da9e7ae0ded6b1fc728ee9fad3044c44e62d6ac14 \
                "$busybox" | /usr/bin/sha256sum -c - >/dev/null || {
                  printf '%s\n' 'CLEANUP_ERROR=BusyBox hash drift'
                  return 1
                }
              cleanup_build_id=$(
                /usr/bin/readelf -n -- "$busybox" |
                  /usr/bin/sed -n 's/.*Build ID: //p' |
                  /usr/bin/head -n 1
              ) || return 1
              [ "$cleanup_build_id" = 351ba74c282274bdd56e030c641d226cab5c14b7 ] || {
                printf '%s\n' 'CLEANUP_ERROR=BusyBox build-id drift'
                return 1
              }
              if /usr/bin/readelf -l -- "$busybox" 2>/dev/null |
                /usr/bin/grep -F 'Requesting program interpreter' >/dev/null
              then
                printf '%s\n' 'CLEANUP_ERROR=BusyBox is not static'
                return 1
              fi
              "$busybox" --list | /usr/bin/grep -Fx rm >/dev/null || {
                printf '%s\n' 'CLEANUP_ERROR=BusyBox rm applet missing'
                return 1
              }
              [ -e "$candidate" ] || return 0
              [ ! -L "$candidate" ] || {
                printf 'CLEANUP_ERROR=refusing symlink %s\n' "$candidate"
                return 1
              }
              parent_real=$(/usr/bin/readlink -f -- "$m5_root") || return 1
              candidate_real=$(/usr/bin/readlink -f -- "$candidate") || return 1
              [ "$(/usr/bin/stat -Lc '%d:%i' -- "$m5_root")" = "$active_m5_parent_devino" ] || {
                printf '%s\n' 'CLEANUP_ERROR=disposable parent identity changed'
                return 1
              }
              [ "$(/usr/bin/stat -Lc '%d:%i' -- "$candidate")" = "$active_m5_case_devino" ] || {
                printf '%s\n' 'CLEANUP_ERROR=fixture identity changed'
                return 1
              }
              [ "$candidate_real" != "$parent_real" ] || {
                printf 'CLEANUP_ERROR=refusing disposable root itself\n'
                return 1
              }
              case "$candidate_real" in
                "$parent_real"/*) ;;
                *)
                  printf 'CLEANUP_ERROR=outside disposable root: %s\n' "$candidate_real"
                  return 1
                  ;;
              esac
              /usr/bin/sudo -n -- "$busybox" rm -rf -- "$candidate_real" || return 1
              [ ! -e "$candidate_real" ] || {
                printf 'CLEANUP_ERROR=path survived cleanup: %s\n' "$candidate_real"
                return 1
              }
              printf 'CLEANUP_OK=%s\n' "$candidate_real"
            }

            on_exit() {
              rc=$?
              trap - EXIT INT TERM HUP
              set +e
              cleanup_rc=0
              if [ -n "$listener_pid" ]; then
                /bin/kill "$listener_pid" 2>/dev/null
                wait "$listener_pid" 2>/dev/null
              fi
              if [ -n "$active_m5_case" ]; then
                if safe_cleanup_m5_case "$active_m5_case"; then
                  active_m5_case=
                else
                  cleanup_rc=$?
                fi
              fi
              if [ -d "$work_root" ]; then
                if [ -z "$active_m5_case" ]; then
                  /bin/rm -rf -- "$work_root" || cleanup_rc=1
                  [ ! -e "$work_root" ] || cleanup_rc=1
                fi
              fi
              if [ "$cleanup_rc" -ne 0 ]; then
                printf 'CLEANUP_FATAL_STATUS=%s ORIGINAL_STATUS=%s\n' \
                  "$cleanup_rc" "$rc"
                rc=200
              fi
              exit "$rc"
            }
            trap on_exit EXIT
            trap 'exit 130' INT
            trap 'exit 143' TERM HUP

            record_elf_closure() {
              label=$1
              shift
              destination="$PWD/$out/elf-closure-$label.txt"
              : >"$destination"
              declare -a queue=()
              declare -A seen=()
              local requested resolved path
              for requested in "$@"; do
                [ -e "$requested" ] || {
                  printf 'MISSING=%s\n' "$requested" >>"$destination"
                  return 1
                }
                queue+=("$(/usr/bin/readlink -f -- "$requested")")
              done
              while ((${#queue[@]})); do
                path=${queue[0]}
                queue=("${queue[@]:1}")
                resolved=$(/usr/bin/readlink -f -- "$path")
                [ -f "$resolved" ] || continue
                if [[ -n ${seen["$resolved"]+yes} ]]; then
                  continue
                fi
                seen["$resolved"]=1
                owner_line=$(
                  /usr/bin/dpkg-query -S "$resolved" 2>/dev/null |
                    /usr/bin/head -n 1
                ) || owner_line=
                {
                  printf '%s\n' "--- PATH=$path RESOLVED=$resolved"
                  /usr/bin/stat -Lc 'MODE=%a UID=%u GID=%g SIZE=%s DEV=%d INO=%i' -- "$resolved"
                  /usr/bin/sha256sum -- "$resolved"
                  /usr/bin/file -- "$resolved"
                  /usr/bin/dpkg-query -S "$resolved" 2>&1 || true
                  if [ -n "$owner_line" ]; then
                    owner_package=${owner_line%%:*}
                    /usr/bin/dpkg-query -W \
                      -f='OWNER_PACKAGE=${binary:Package} OWNER_VERSION=${Version} OWNER_ARCH=${Architecture}\n' \
                      "$owner_package"
                  else
                    printf '%s\n' 'OWNER_PACKAGE=UNPACKED_INPUT'
                  fi
                  /usr/bin/readelf -n -- "$resolved" 2>&1 || true
                  /usr/bin/readelf -l -- "$resolved" 2>&1 || true
                  /usr/bin/readelf -d -- "$resolved" 2>&1 || true
                  /usr/bin/ldd -- "$resolved" 2>&1 || true
                } >>"$destination"
                mapfile -t discovered < <(
                  {
                    /usr/bin/readelf -l -- "$resolved" 2>/dev/null |
                      /usr/bin/sed -n 's@.*interpreter: \([^]]*\).*@\1@p'
                    /usr/bin/ldd -- "$resolved" 2>/dev/null |
                      /usr/bin/awk '
                        /=>[[:space:]]+\// {
                          for (i = 1; i <= NF; i++) if ($i ~ /^\//) print $i
                        }
                        /^[[:space:]]*\// { print $1 }
                      '
                  } | LC_ALL=C /usr/bin/sort -u
                )
                if ((${#discovered[@]})); then
                  queue+=("${discovered[@]}")
                fi
              done
            }

            assert_runner_owned_tree() {
              root=$1
              while IFS= read -r -d '' path; do
                owner=$(/usr/bin/stat -Lc '%u:%g' -- "$path")
                printf 'SDK_OWNER=%s %s\n' "$owner" "$path"
                [ "$owner" = "$uid:$gid" ]
              done < <(/usr/bin/find "$root" -mindepth 0 -print0)
            }

            wait_for_no_bwrap() {
              attempt=0
              while /usr/bin/pgrep -f -- "$bwrap" >/dev/null 2>&1; do
                attempt=$((attempt + 1))
                [ "$attempt" -lt 50 ] || {
                  printf 'BWRAP_HELPER_SURVIVED=%s\n' "$bwrap"
                  return 1
                }
                /bin/sleep 0.1
              done
            }

            safe_cleanup_m5_case() {
              candidate=$1
              wait_for_no_bwrap || {
                printf 'CLEANUP_ERROR=Bubblewrap helper still active for %s\n' "$candidate"
                return 1
              }
              if /usr/bin/grep -F -- "$candidate" /proc/self/mountinfo >/dev/null; then
                printf 'CLEANUP_ERROR=host mount still references %s\n' "$candidate"
                return 1
              fi
              cleanup_m5_case "$candidate" || return 1
            }

            make_m5_case() {
              name=$1
              candidate="$m5_root/$name"
              /usr/bin/mkdir -m 0701 -- "$candidate"
              /usr/bin/mkdir -m 0703 -- "$candidate/selected"
              /usr/bin/mkdir -m 0700 -- "$candidate/sibling"
              /usr/bin/mkdir -m 0701 -- "$candidate/selected/mnt"
              /usr/bin/printf 'input\n' >"$candidate/selected/input"
              active_m5_parent_devino=$(/usr/bin/stat -Lc '%d:%i' -- "$m5_root")
              active_m5_case_devino=$(/usr/bin/stat -Lc '%d:%i' -- "$candidate")
              active_m5_case=$candidate
            }

            finish_m5_case() {
              selected=$1
              proof=$2
              proof_status=0
              if [ -f "$selected/$proof" ]; then
                owner=$(/usr/bin/stat -Lc '%u:%g' -- "$selected/$proof") || proof_status=1
                printf 'M5_OUTER_OWNER=%s PATH=%s\n' "${owner-UNKNOWN}" "$selected/$proof"
                [ "${owner-}" = '0:0' ] || proof_status=1
              else
                printf 'M5_PROOF_MISSING=%s\n' "$selected/$proof"
                proof_status=1
              fi
              case_path=$active_m5_case
              safe_cleanup_m5_case "$case_path" || return 2
              active_m5_case=
              active_m5_case_devino=
              active_m5_parent_devino=
              [ ! -e "$case_path" ] || return 1
              return "$proof_status"
            }

            finalize_m5_lane() {
              lane_name=$1
              selected=$2
              proof=$3
              invocation_ok=$4
              if finish_m5_case "$selected" "$proof"; then
                finish_status=0
              else
                finish_status=$?
              fi
              if [ "$finish_status" -eq 2 ]; then
                printf 'M5_%s_CLEANUP=FAIL\n' "$lane_name" >>"$m5_result"
                return 2
              fi
              printf 'M5_%s_CLEANUP=PASS\n' "$lane_name" >>"$m5_result"
              if [ "$finish_status" -eq 0 ]; then
                printf 'M5_%s_PROOF=PASS\n' "$lane_name" >>"$m5_result"
              else
                printf 'M5_%s_PROOF=FAIL\n' "$lane_name" >>"$m5_result"
              fi
              if [ "$invocation_ok" -eq 1 ] && [ "$finish_status" -eq 0 ]; then
                printf 'M5_%s_RESULT=PASS\n' "$lane_name" >>"$m5_result"
                return 0
              fi
              printf 'M5_%s_RESULT=FAIL\n' "$lane_name" >>"$m5_result"
              return 1
            }

            run_m5_bwrap() {
              capability_mode=$1
              selected=$2
              shift 2
              declare -a capability_args=(--cap-drop ALL)
              case "$capability_mode" in
                zero) ;;
                mount) capability_args+=(--cap-add CAP_SYS_ADMIN) ;;
                *) return 2 ;;
              esac
              /usr/bin/sudo -n -- "$bwrap" \
                --die-with-parent --new-session \
                --unshare-user --disable-userns \
                --unshare-net --unshare-pid --unshare-uts --unshare-ipc \
                --uid 0 --gid 0 "${capability_args[@]}" \
                --clearenv \
                --setenv PATH /bin --setenv HOME / --setenv TMPDIR /tmp \
                --setenv LC_ALL C --setenv TZ UTC \
                --perms 0755 --size 33554432 --tmpfs / \
                --dir /bin --perms 0555 --file 0 /bin/busybox \
                --symlink busybox /bin/sh \
                --proc /proc --dev /dev \
                --perms 0700 --size 16777216 --tmpfs /tmp \
                --dir /fixture --bind "$selected" /fixture \
                --chdir / -- \
                "$@" <"$busybox"
            }

            printf '%s\n' '=== RUNNER / KERNEL / POLICY ==='
            printf 'ImageOS=%s\nImageVersion=%s\nRUNNER_OS=%s\nRUNNER_ARCH=%s\n' \
              "${ImageOS-}" "${ImageVersion-}" "${RUNNER_OS-}" "${RUNNER_ARCH-}"
            printf 'UID=%s\nGID=%s\nGROUPS=%s\nHOST_PID=%s\nHOST_NET=%s\nHOST_MNT=%s\nHOST_USER=%s\nHOST_PIDNS=%s\nHOST_UTS=%s\nHOST_IPC=%s\n' \
              "$uid" "$gid" "$(/usr/bin/id -G)" "$host_pid" "$host_net" "$host_mnt" "$host_user" \
              "$host_pidns" "$host_uts" "$host_ipc"
            /usr/bin/uname -a
            /usr/bin/cat /etc/os-release
            /usr/bin/cat /proc/self/attr/current 2>/dev/null || true
            for policy_path in \
              /sys/module/apparmor/parameters/enabled \
              /proc/sys/kernel/unprivileged_userns_clone \
              /proc/sys/kernel/apparmor_restrict_unprivileged_userns
            do
              if [ -r "$policy_path" ]; then
                printf '%s=' "$policy_path"
                /usr/bin/cat "$policy_path"
              fi
            done
            /usr/bin/findmnt -no TARGET,PROPAGATION / 2>&1 || true

            printf '%s\n' '=== PACKAGE IDENTITIES ==='
            /usr/bin/dpkg-query -W -f='${binary:Package}\t${Version}\t${Architecture}\n' \
              sudo util-linux coreutils dash libc6 libcap-ng0 libselinux1 \
              libcap2 libpcre2-8-0 2>&1

            printf '%s\n' '=== SUDO AUTHORITY / POLICY ==='
            /usr/bin/sudo -V >"$PWD/$out/sudo-version.txt" 2>&1
            /usr/bin/sudo -n -- /usr/bin/true
            /usr/bin/sudo -n -- /usr/bin/id -u >"$PWD/$out/sudo-root-id.txt"
            [ "$(/usr/bin/cat "$PWD/$out/sudo-root-id.txt")" = 0 ]
            set +e
            LD_LIBRARY_PATH=/taoistfuchen-denied \
            LD_PRELOAD=/taoistfuchen-denied.so \
              /usr/bin/sudo -n -- /usr/bin/env \
                2>"$PWD/$out/sudo-loader-env.stderr.txt" |
              /usr/bin/grep -E '^LD_(AUDIT|LIBRARY_PATH|PRELOAD)=' >/dev/null
            pipeline_status=("${PIPESTATUS[@]}")
            sudo_env_status=${pipeline_status[0]}
            loader_env_match_status=${pipeline_status[1]}
            set -e
            [ "$sudo_env_status" -eq 0 ]
            [ "$loader_env_match_status" -eq 1 ]
            printf '%s\n' 'SUDO_LOADER_ENVIRONMENT=STRIPPED_WITHOUT_ENV_DUMP' \
              >"$PWD/$out/sudo-loader-env-result.txt"

            mapfile -t sudo_elfs < <(
              /usr/bin/dpkg-query -L sudo |
                while IFS= read -r path; do
                  [ -f "$path" ] || continue
                  /usr/bin/readelf -h -- "$path" >/dev/null 2>&1 || continue
                  /usr/bin/readlink -f -- "$path"
                done | LC_ALL=C /usr/bin/sort -u
            )
            record_elf_closure host \
              /usr/bin/sudo /usr/bin/unshare /usr/bin/setpriv /usr/bin/id \
              /usr/bin/nsenter /usr/bin/readlink /usr/bin/sha256sum \
              /usr/bin/stat /usr/bin/env /usr/bin/true /usr/bin/timeout \
              /usr/bin/findmnt /usr/bin/grep /usr/bin/pgrep \
              /bin/sh "${sudo_elfs[@]}"

            /usr/bin/mkdir -m 0700 -- "$work_root" "$download_root" "$extract_root"

            printf '%s\n' '=== PINNED PACKAGE INPUTS ==='
            bwrap_deb="$download_root/bubblewrap_0.9.0-1ubuntu0.1_amd64.deb"
            busybox_deb="$download_root/busybox-static_1.36.1-6ubuntu3.1_amd64.deb"
            /usr/bin/curl --fail --location --retry 3 --proto '=https' --tlsv1.2 \
              'https://snapshot.ubuntu.com/ubuntu/20260719T000000Z/pool/main/b/bubblewrap/bubblewrap_0.9.0-1ubuntu0.1_amd64.deb' \
              --output "$bwrap_deb"
            /usr/bin/printf '%s  %s\n' \
              1b506492bd9c7fd0cdb4f02ac822f1d3e336b0aead5113c1239baf8db5db562a \
              "$bwrap_deb" | /usr/bin/sha256sum -c -
            [ "$(/usr/bin/dpkg-deb -f "$bwrap_deb" Package)" = bubblewrap ]
            [ "$(/usr/bin/dpkg-deb -f "$bwrap_deb" Version)" = 0.9.0-1ubuntu0.1 ]
            [ "$(/usr/bin/dpkg-deb -f "$bwrap_deb" Architecture)" = amd64 ]
            {
              /usr/bin/printf 'Package=%s\n' "$(/usr/bin/dpkg-deb -f "$bwrap_deb" Package)"
              /usr/bin/printf 'Version=%s\n' "$(/usr/bin/dpkg-deb -f "$bwrap_deb" Version)"
              /usr/bin/printf 'Architecture=%s\n' "$(/usr/bin/dpkg-deb -f "$bwrap_deb" Architecture)"
              /usr/bin/printf 'Depends=%s\n' "$(/usr/bin/dpkg-deb -f "$bwrap_deb" Depends)"
            } >"$PWD/$out/bubblewrap-control.txt"
            /usr/bin/dpkg-deb -x "$bwrap_deb" "$extract_root/bubblewrap"
            bwrap="$extract_root/bubblewrap/usr/bin/bwrap"
            [ -x "$bwrap" ]
            /usr/bin/printf '%s  %s\n' \
              52231e1caf55bcbc667b269f49c63599a6f7db4767ae6a039580d0ff853db712 \
              "$bwrap" | /usr/bin/sha256sum -c -
            bwrap_build_id=$(
              /usr/bin/readelf -n -- "$bwrap" |
                /usr/bin/sed -n 's/.*Build ID: //p' |
                /usr/bin/head -n 1
            )
            [ "$bwrap_build_id" = e1a0ef69f8106c7ee586e06a65f23e1b166bdcbe ]
            /usr/bin/sudo -n -- "$bwrap" --version >"$PWD/$out/bubblewrap-version.txt"
            /usr/bin/grep -Fx 'bubblewrap 0.9.0' "$PWD/$out/bubblewrap-version.txt"

            /usr/bin/curl --fail --location --retry 3 --proto '=https' --tlsv1.2 \
              'https://snapshot.ubuntu.com/ubuntu/20260719T000000Z/pool/main/b/busybox/busybox-static_1.36.1-6ubuntu3.1_amd64.deb' \
              --output "$busybox_deb"
            /usr/bin/printf '%s  %s\n' \
              944b2728f53ceb3916cec2c962873c9951e612408099601751db2a0a5d81e0ed \
              "$busybox_deb" | /usr/bin/sha256sum -c -
            [ "$(/usr/bin/dpkg-deb -f "$busybox_deb" Package)" = busybox-static ]
            [ "$(/usr/bin/dpkg-deb -f "$busybox_deb" Version)" = 1:1.36.1-6ubuntu3.1 ]
            [ "$(/usr/bin/dpkg-deb -f "$busybox_deb" Architecture)" = amd64 ]
            /usr/bin/dpkg-deb -x "$busybox_deb" "$extract_root/busybox"
            mapfile -t busybox_candidates < <(
              /usr/bin/find "$extract_root/busybox" -type f -name busybox -print
            )
            [ "${#busybox_candidates[@]}" -eq 1 ]
            busybox=${busybox_candidates[0]}
            [ -x "$busybox" ]
            /usr/bin/printf '%s  %s\n' \
              dbac288c29ba568459550a2da9e7ae0ded6b1fc728ee9fad3044c44e62d6ac14 \
              "$busybox" | /usr/bin/sha256sum -c -
            busybox_build_id=$(
              /usr/bin/readelf -n -- "$busybox" |
                /usr/bin/sed -n 's/.*Build ID: //p' |
                /usr/bin/head -n 1
            )
            [ "$busybox_build_id" = 351ba74c282274bdd56e030c641d226cab5c14b7 ]
            ! /usr/bin/readelf -l -- "$busybox" 2>/dev/null |
              /usr/bin/grep -F 'Requesting program interpreter' >/dev/null
            for required_applet in \
              ash awk cat dd mkdir mount nc readlink rm sh sha256sum sleep stat true umount unshare
            do
              "$busybox" --list | /usr/bin/grep -Fx "$required_applet" >/dev/null
            done
            {
              /usr/bin/printf 'Package=%s\n' "$(/usr/bin/dpkg-deb -f "$busybox_deb" Package)"
              /usr/bin/printf 'Version=%s\n' "$(/usr/bin/dpkg-deb -f "$busybox_deb" Version)"
              /usr/bin/printf 'Architecture=%s\n' "$(/usr/bin/dpkg-deb -f "$busybox_deb" Architecture)"
              /usr/bin/printf 'ExtractedPath=%s\n' "${busybox#"$extract_root/busybox"/}"
            } >"$PWD/$out/busybox-control.txt"
            record_elf_closure pinned "$bwrap" "$busybox"

            printf '%s\n' '=== CONTROLLED EXTRACTED-TOOL DRIFT ==='
            /usr/bin/mkdir -m 0700 -- "$work_root/drift"
            /bin/cp -- "$bwrap" "$work_root/drift/bwrap"
            /bin/cp -- "$busybox" "$work_root/drift/busybox"
            /usr/bin/printf 'drift\n' >>"$work_root/drift/bwrap"
            /usr/bin/printf 'drift\n' >>"$work_root/drift/busybox"
            if /usr/bin/printf '%s  %s\n' \
              52231e1caf55bcbc667b269f49c63599a6f7db4767ae6a039580d0ff853db712 \
              "$work_root/drift/bwrap" | /usr/bin/sha256sum -c - >/dev/null 2>&1
            then
              exit 81
            fi
            if /usr/bin/printf '%s  %s\n' \
              dbac288c29ba568459550a2da9e7ae0ded6b1fc728ee9fad3044c44e62d6ac14 \
              "$work_root/drift/busybox" | /usr/bin/sha256sum -c - >/dev/null 2>&1
            then
              exit 82
            fi
            printf '%s\n' 'EXTRACTED_TOOL_DRIFT=REJECTED_BEFORE_PRIVILEGED_ENTRY'

            printf '%s\n' '=== PARENT LISTENER ==='
            listener_port_file="$PWD/$out/listener-port.txt"
            parent_socket="$work_root/parent.sock"
            /usr/bin/python3 -c '
          import pathlib
          import select
          import socket
          import sys

          listener = socket.socket()
          listener.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          listener.bind(("127.0.0.1", 0))
          listener.listen()
          unix_listener = socket.socket(socket.AF_UNIX)
          unix_listener.bind(sys.argv[2])
          unix_listener.listen()
          pathlib.Path(sys.argv[1]).write_text(str(listener.getsockname()[1]), encoding="ascii")
          while True:
              readable, _, _ = select.select([listener, unix_listener], [], [])
              for current in readable:
                  connection, _ = current.accept()
                  connection.close()
          ' "$listener_port_file" "$parent_socket" &
            listener_pid=$!
            for unused in {1..100}; do
              [ -s "$listener_port_file" ] && break
              /bin/sleep 0.05
            done
            [ -s "$listener_port_file" ]
            [ -S "$parent_socket" ]
            listener_port=$(/usr/bin/cat "$listener_port_file")
            [[ "$listener_port" =~ ^[0-9]+$ ]]
            /usr/bin/python3 -c \
