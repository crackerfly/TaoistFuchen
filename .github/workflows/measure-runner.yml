name: Measure ubuntu-24.04 runner for TaoistFuchen

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  measure:
    name: Measure exact host tools and namespaces
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Collect exact runner evidence
        shell: bash
        run: |
          set -u -o pipefail
          umask 077
          out=runner-measurement
          mkdir -m 0700 "$out"

          {
            echo '=== RUNNER IDENTITY ==='
            printf 'ImageOS=%s\n' "${ImageOS-}"
            printf 'ImageVersion=%s\n' "${ImageVersion-}"
            printf 'RUNNER_ARCH=%s\n' "${RUNNER_ARCH-}"
            printf 'RUNNER_OS=%s\n' "${RUNNER_OS-}"
            uname -a
            cat /etc/os-release

            echo '=== REQUESTED PACKAGE VERSIONS ==='
            dpkg-query -W -f='${binary:Package}\t${Version}\t${Architecture}\n' \
              bubblewrap util-linux dash libc6 libselinux1 libcap2 \
              libpcre2-8-0 2>&1 || true

            : >"$out/closure-paths.txt"
            for requested in \
              /usr/bin/bwrap /usr/bin/unshare /usr/bin/flock /bin/sh
            do
              echo "=== REQUESTED $requested ==="
              if [ ! -e "$requested" ]; then
                echo 'MISSING'
                continue
              fi
              resolved="$(readlink -f -- "$requested")"
              printf 'REQUESTED=%s\nRESOLVED=%s\n' "$requested" "$resolved"
              stat -Lc 'MODE=%a UID=%u GID=%g SIZE=%s DEV=%d INO=%i' \
                -- "$requested"
              dpkg-query -S "$requested" "$resolved" 2>&1 || true
              sha256sum -- "$resolved"
              file -- "$resolved"
              readelf -n -- "$resolved" 2>&1 || true
              readelf -l -- "$resolved" 2>&1 || true
              ldd -- "$resolved" 2>&1 | tee "$out/ldd-$(basename "$requested").txt"
              awk '
                /=>[[:space:]]+\// {
                  for (i = 1; i <= NF; i++) if ($i ~ /^\//) print $i
                }
                /^[[:space:]]*\// { print $1 }
              ' "$out/ldd-$(basename "$requested").txt" \
                >>"$out/closure-paths.txt"
              readelf -l -- "$resolved" 2>/dev/null | \
                sed -n 's@.*interpreter: \([^]]*\).*@\1@p' \
                >>"$out/closure-paths.txt"
            done

            echo '=== COMPLETE ON-DISK ELF CLOSURE ==='
            LC_ALL=C sort -u "$out/closure-paths.txt" -o "$out/closure-paths.txt"
            while IFS= read -r path; do
              [ -n "$path" ] || continue
              resolved="$(readlink -f -- "$path")"
              printf '%s\n' "--- CLOSURE PATH=$path RESOLVED=$resolved"
              dpkg-query -S "$path" "$resolved" 2>&1 || true
              sha256sum -- "$resolved"
              file -- "$resolved"
              readelf -n -- "$resolved" 2>&1 || true
              readelf -l -- "$resolved" 2>&1 || true
            done <"$out/closure-paths.txt"

            echo '=== USER/NETWORK NAMESPACE PROBE ==='
            set +e
            /usr/bin/unshare --user --map-current-user --net --mount-proc \
              /bin/true
            unshare_status=$?
            set -e
            printf 'UNSHARE_STATUS=%s\n' "$unshare_status"

            echo '=== BUBBLEWRAP READ-ONLY-ROOT PROBE ==='
            mkdir -m 0700 "$out/bwrap-fixture"
            printf 'read-only input\n' >"$out/bwrap-fixture/input"
            chmod 0600 "$out/bwrap-fixture/input"
            set +e
            /usr/bin/bwrap \
              --die-with-parent \
              --unshare-user \
              --unshare-net \
              --ro-bind / / \
              --dev /dev \
              --proc /proc \
              --bind "$PWD/$out/bwrap-fixture" /tmp/fixture \
              /bin/sh -eu -c \
                'test "$(cat /tmp/fixture/input)" = "read-only input"; printf "ok\n" > /tmp/fixture/output'
            bwrap_status=$?
            set -e
            printf 'BWRAP_STATUS=%s\n' "$bwrap_status"
            if [ -f "$out/bwrap-fixture/output" ]; then
              printf 'BWRAP_OUTPUT='
              cat "$out/bwrap-fixture/output"
            fi

            echo '=== RESULT ==='
            if [ "$unshare_status" -ne 0 ] || [ "$bwrap_status" -ne 0 ]; then
              echo 'NAMESPACE_CAPABILITY=FAIL'
            else
              echo 'NAMESPACE_CAPABILITY=PASS'
            fi
          } >"$out/measurement.txt" 2>&1

          sha256sum "$out/measurement.txt" "$out/closure-paths.txt" \
            >"$out/SHA256SUMS"
          cat "$out/measurement.txt"
          cat "$out/SHA256SUMS"

      - name: Upload runner evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: taoistfuchen-ubuntu-24.04-runner-measurement
          path: runner-measurement/
          if-no-files-found: error
          retention-days: 7

